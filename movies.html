<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Browse Movies — MovieNation</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
.movies-page-hero{padding:clamp(90px,14vw,150px) 0 clamp(28px,5vw,48px);background:linear-gradient(180deg,var(--bg2),var(--bg));text-align:center}
.movies-page-hero h1{font-family:var(--ft);font-size:clamp(2.5rem,7vw,5rem);letter-spacing:3px;margin-bottom:10px}
.movies-page-hero p{color:var(--muted);font-size:clamp(.84rem,1.5vw,.96rem)}
#result-count{font-size:.78rem;color:var(--muted);white-space:nowrap}
</style>
</head>
<body>
<div id="preloader"><div class="pre-logo">MOVIENATION</div><div class="pre-bar"><div class="pre-fill"></div></div></div>
<nav id="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html"><span class="nav-dot"></span>MOVIENATION</a>
    <div id="mnav">
      <div class="nav-links">
        <a href="index.html">Home</a><a href="movies.html" class="active">Movies</a>
        <a href="upcoming.html">Upcoming</a><a href="about.html">About</a>
      </div>
      <div class="nav-search"><i class="ri-search-line si"></i><input type="text" id="nav-q" placeholder="Search…" autocomplete="off"><div id="sdrop"></div></div>
    </div>
    <div class="nav-actions">
      <button class="nav-icon-btn theme-btn"><i class="ri-moon-line"></i></button>
      <button id="burger-btn" onclick="toggleNav()"><i class="ri-menu-line"></i></button>
    </div>
  </div>
</nav>

<div class="movies-page-hero">
  <div class="wrap">
    <div class="sec-label-sm" style="justify-content:center;margin-bottom:10px">Full Library</div>
    <h1>Browse Movies</h1>
    <p>Explore our complete collection — filter by genre, sort by rating</p>
  </div>
</div>

<section class="section" style="padding-top:clamp(24px,4vw,40px)">
  <div class="wrap">
    <div class="filter-bar">
      <div class="filter-search"><i class="ri-search-line"></i><input type="text" id="filter-q" placeholder="Search title or director…" oninput="filterMovies()"></div>
      <select id="filter-genre" class="sort-sel" onchange="filterMovies()"><option value="">All Genres</option></select>
      <select id="filter-sort" class="sort-sel" onchange="filterMovies()">
        <option value="">Default</option>
        <option value="rating">Top Rated</option>
        <option value="year-desc">Newest First</option>
        <option value="year-asc">Oldest First</option>
        <option value="title">A–Z</option>
      </select>
      <select id="filter-status" class="sort-sel" onchange="filterMovies()">
        <option value="">All Films</option>
        <option value="new">New Releases</option>
        <option value="featured">Featured</option>
        <option value="top">Top Rated 8+</option>
      </select>
      <span id="result-count" style="margin-left:auto"></span>
    </div>
    <div class="movies-grid" id="movies-grid"></div>
    <div class="empty-state" id="movies-empty" style="display:none"><i class="ri-film-line"></i><p>No movies match your filters.</p></div>
  </div>
</section>

<footer style="margin-top:auto">
  <div class="footer-inner">
    <div class="footer-bottom"><span>© 2025 MovieNation</span><a href="index.html" style="color:var(--gold)">← Back to Home</a></div>
  </div>
</footer>
<button id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="ri-arrow-up-line"></i></button>
<div id="toasts"></div>
<div id="tm"><div class="trailer-head"><span class="trailer-title"></span><button class="trailer-close" onclick="closeTrailer()"><i class="ri-close-line"></i></button></div><div class="vid-wrap"></div></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/data.js"></script>
<script src="js/data-manager.js"></script>
<script src="js/analytics.js"></script>
<script src="js/app.js"></script>
</body></html>
